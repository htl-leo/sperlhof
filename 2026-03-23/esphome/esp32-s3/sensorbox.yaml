substitutions:
  name: "s3_oled_sensorbox"
  
esphome:
  name: ${name}
  # platform: esp32
  # board: esp32-s3-devkitc-1

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino
    # type: esp-idf


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  
  ap:
    ssid: substitutions.name
    password: "12345678"

captive_portal:

logger:

ota:
  password: "585353d758e3f126d2f4982f0695d956"
  platform: esphome

web_server:
  port: 80

api:
  encryption:
    key: "18T6rbg6kRjpusDhj2opiK2Rr9jksMd7ikNJ7IwsSeE="

# mqtt:
#   broker: !secret mqtt_broker
#   username: !secret mqtt_user
#   password: !secret mqtt_password

spi:
  clk_pin: GPIO01
  mosi_pin: GPIO02

font:
  - file: "fonts/Arial.ttf"
    id: font1
    size: 40

display:
  - platform: ili9xxx
    model: ST7789V
    dc_pin: GPIO04
    reset_pin: GPIO05
    cs_pin: GPIO03
    data_rate: 40MHz
    update_interval: 5s
    invert_colors: true
    rotation: 90
    dimensions:
      width: 240
      height: 320
    lambda: |-
      it.fill(Color(255, 0, 0));
      it.printf(10, 10, id(font1), "Hello World");

output:
  # - platform: gpio
  #   pin: GPIO06
  #   id: backlight_on

  - platform: ledc
    pin: GPIO06
    id: backlight_pwm
    frequency: 20000Hz  

  - platform: gpio
    pin: GPIO07
    id: buzzer_output

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "TFT Backlight"
    id: tft_light
    default_transition_length: 0s
    restore_mode: ALWAYS_ON
    on_turn_on:
      then:
        - light.dim_relative:
            id: tft_light
            relative_brightness: 80%

uart:
  id: ld2410_uart
  rx_pin: GPIO10
  tx_pin: GPIO11
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2410:
  uart_id: ld2410_uart

binary_sensor:
  - platform: ld2410
    has_target:
      name: Presence
    has_moving_target:
      name: Moving Target
    has_still_target:
      name: Still Target
    out_pin_presence_status:
      name: out pin presence status

sensor:
  - platform: ld2410
    light:
      name: light
    moving_distance:
      name: Moving Distance
    still_distance:
      name: Still Distance
    moving_energy:
      name: Move Energy
    still_energy:
      name: Still Energy
    detection_distance:
      name: Detection Distance

text_sensor:
  - platform: ld2410
    version:
      name: "LD2410 Firmware Version"
